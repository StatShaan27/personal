<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opportunities | Shaan</title>
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;500&display=swap" rel="stylesheet">

  <style>
    .opp-card {
  border-left: 4px solid #58a6ff;
  background-color: #121212;
  padding: 1rem 1.5rem;
  margin: 1rem auto;
  border-radius: 10px;
  max-width: 700px;
  text-align: left;
  transition: transform 0.3s ease;
}

.opp-card:hover {
  transform: scale(1.01);
}

.opp-title {
  font-size: 1.2rem;
  color: #c9d1d9;
  font-weight: 600;
}

.opp-meta {
  font-size: 0.9rem;
  color: #aaa;
  margin-top: 0.3rem;
}

.opp-link {
  display: inline-block;
  margin-top: 0.6rem;
  color: #58a6ff;
  text-decoration: none;
  font-size: 0.95rem;
}

.opp-link:hover {
  text-decoration: underline;
}
  </style>
</head>

<body>

  <header>
    <h1>Opportunities Tracker</h1>
    <p>Summer and Winter programs — automatically sorted by application timeline.</p>

    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../assets/Shaan_CV.pdf">CV</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="education.html">Education</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="misc.html">Misc</a></li>
      </ul>
    </nav>
  </header>

  <main class="opp-wrapper">

    <!-- LIVE SECTION -->
    <section class="opp-block">
      <h2>Live Applications</h2>
      <div id="live-list">
        <p class="coming-soon">No active applications currently.</p>
      </div>
    </section>

    <!-- OTHERS SECTION -->
    <section class="opp-block">
      <h2>Other Opportunities</h2>
      <div id="other-list"></div>
    </section>

  </main>

  <footer>
    <p>&copy; 2025 Shaan | Built with clarity</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const today = new Date();

      const liveContainer = document.getElementById("live-list");
      const otherContainer = document.getElementById("other-list");

      const projects = [
        {
          name: "ISI Summer Internship",
          start: "2026-03-01",
          end: "2026-04-15",
          link: "#"
        },
        {
          name: "IIT Madras Winter Project",
          start: "2026-10-01",
          end: "2026-11-10",
          link: "#"
        }
      ];

      projects.forEach(project => {
  const startDate = new Date(project.reg_start);
  const endDate = new Date(project.reg_end);

  const card = document.createElement("div");
  card.className = "opp-card";

  card.innerHTML = `
    <div class="opp-title">${project.name}</div>
    <div class="opp-meta">${project.university}, ${project.country}</div>
    <div class="opp-meta"><strong>Registration:</strong> ${project.reg_start} → ${project.reg_end}</div>
    <div class="opp-meta"><strong>Program:</strong> ${project.prog_start} → ${project.prog_end}</div>
    <div class="opp-meta"><strong>Recommendations:</strong> ${project.reco}</div>
    <a href="${project.link}" class="opp-link" target="_blank">View Details</a>
  `;

  if (today >= startDate && today <= endDate) {
    liveContainer.innerHTML = "";
    liveContainer.appendChild(card);
  } else {
    otherContainer.appendChild(card);
  }
});
    });
  </script>

</body>
</html>
