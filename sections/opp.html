<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opportunities | Shaan</title>

  <!-- Styles -->
  <link rel="stylesheet" href="../style.css" />

  <!-- Script -->
  <script defer src="../script.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;500&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Background Pattern -->
  <div class="background-pattern"></div>

  <header>
    <h1>Opportunities Tracker</h1>
    <p>Summer and Winter programs — sortable, filterable, and deadline-aware.</p>

    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../assets/Shaan_CV.pdf">CV</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="education.html">Education</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="misc.html">Misc</a></li>
      </ul>
    </nav>
  </header>

  <main class="opp-wrapper">

    <section class="opp-block">
      <h2>Opportunities</h2>

      <!-- Search -->
      <input 
        type="text" 
        id="searchBox" 
        placeholder="Search by name, university, or country..."
      >

      <!-- Table -->
      <table id="opp-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>University</th>
            <th>Country</th>
            <th>Reg Start</th>
            <th>Reg End</th>
            <th>Program</th>
            <th>Reco</th>
            <th>Days Left</th>
            <th>Link</th>
          </tr>
        </thead>

        <!-- IMPORTANT: This is required for JS -->
        <tbody id="table-body">
          <!-- Data will be inserted here by script.js -->
        </tbody>
      </table>

    </section>

  </main>

  <footer>
    <p>&copy; 2025 Shaan | Built with clarity</p>
  </footer>

</body>
</html>
