<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opportunities | Shaan</title>
  <link rel="stylesheet" href="../style.css" />
  <script defer src="../script.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;500&display=swap" rel="stylesheet">

  <style>
    .opp-card {
  border-left: 4px solid #58a6ff;
  background-color: #121212;
  padding: 1rem 1.5rem;
  margin: 1rem auto;
  border-radius: 10px;
  max-width: 700px;
  text-align: left;
  transition: transform 0.3s ease;
}

.opp-card:hover {
  transform: scale(1.01);
}

.opp-title {
  font-size: 1.2rem;
  color: #c9d1d9;
  font-weight: 600;
}

.opp-meta {
  font-size: 0.9rem;
  color: #aaa;
  margin-top: 0.3rem;
}

.opp-link {
  display: inline-block;
  margin-top: 0.6rem;
  color: #58a6ff;
  text-decoration: none;
  font-size: 0.95rem;
}

.opp-link:hover {
  text-decoration: underline;
}
  </style>
</head>

<body>

  <header>
    <h1>Opportunities Tracker</h1>
    <p>Summer and Winter programs — automatically sorted by application timeline.</p>

    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../assets/Shaan_CV.pdf">CV</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="education.html">Education</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="misc.html">Misc</a></li>
      </ul>
    </nav>
  </header>

  <main class="opp-wrapper">

    <main class="opp-wrapper">

  <section class="opp-block">
    <h2>Opportunities</h2>

    <input 
      type="text" 
      id="searchBox" 
      placeholder="Search by name or university..."
      style="padding:0.6rem; width:80%; margin:1rem auto; display:block; border-radius:6px; border:none;"
    >

    <table id="opp-table" style="width:100%; border-collapse: collapse; margin-top:1rem;">
      <thead>
        <tr>
          <th>Name</th>
          <th>University</th>
          <th>Country</th>
          <th>Reg Start</th>
          <th>Reg End</th>
          <th>Program</th>
          <th>Reco</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>

  </section>

</main>

  </main>

  <footer>
    <p>&copy; 2025 Shaan | Built with clarity</p>
  </footer>

  

</body>
</html>
