<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opportunities | Shaan</title>
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      color: #58a6ff;
    }

    header p {
      font-size: 1.1rem;
      color: #8b949e;
    }

    nav ul {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding: 0;
      list-style: none;
    }

    nav ul li a {
      color: #c9d1d9;
      text-decoration: none;
      font-weight: 500;
    }

    nav ul li a:hover {
      color: #58a6ff;
    }

    .opp-wrapper {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
    }

    .opp-block {
      margin-bottom: 3rem;
      text-align: center;
    }

    .opp-block h2 {
      font-family: 'Playfair Display', serif;
      color: #58a6ff;
      margin-bottom: 1rem;
    }

    .opp-link {
      display: block;
      margin: 0.8rem auto;
      font-size: 1.05rem;
      color: #c9d1d9;
      text-decoration: none;
      border: 2px solid #58a6ff;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      width: fit-content;
      transition: all 0.3s ease;
    }

    .opp-link:hover {
      background-color: #58a6ff;
      color: #000;
      transform: scale(1.05);
    }

    .coming-soon {
      color: #888;
      font-style: italic;
      font-size: 0.95rem;
      margin-top: 0.5rem;
    }

    footer {
      text-align: center;
      padding: 2rem 0;
      color: #8b949e;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <header>
    <h1>Opportunities Tracker</h1>
    <p>Summer and Winter programs — automatically sorted by application timeline.</p>

    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../assets/Shaan_CV.pdf">CV</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="education.html">Education</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="misc.html">Misc</a></li>
      </ul>
    </nav>
  </header>

  <main class="opp-wrapper">

    <!-- LIVE SECTION -->
    <section class="opp-block">
      <h2>Live Applications</h2>
      <div id="live-list">
        <p class="coming-soon">No active applications currently.</p>
      </div>
    </section>

    <!-- OTHERS SECTION -->
    <section class="opp-block">
      <h2>Other Opportunities</h2>
      <div id="other-list"></div>
    </section>

  </main>

  <footer>
    <p>&copy; 2025 Shaan | Built with clarity</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const today = new Date();

      const liveContainer = document.getElementById("live-list");
      const otherContainer = document.getElementById("other-list");

      const projects = [
        {
          name: "ISI Summer Internship",
          start: "2026-03-01",
          end: "2026-04-15",
          link: "#"
        },
        {
          name: "IIT Madras Winter Project",
          start: "2026-10-01",
          end: "2026-11-10",
          link: "#"
        }
      ];

      projects.forEach(project => {
        const startDate = new Date(project.start);
        const endDate = new Date(project.end);

        const link = document.createElement("a");
        link.href = project.link;
        link.textContent = project.name;
        link.className = "opp-link";

        if (today >= startDate && today <= endDate) {
          liveContainer.innerHTML = "";
          liveContainer.appendChild(link);
        } else {
          otherContainer.appendChild(link);
        }
      });
    });
  </script>

</body>
</html>
